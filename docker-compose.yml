version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: bookmark_db

    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bookmark_api

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mongodb

    volumes:
      - .:/app
      - /app/node_modules

    networks:
      - app_network

volumes:
  mongodb_data:

networks:
  app_network:
