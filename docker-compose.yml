services:
  mongodb:
    image: mongo:7

    container_name: bookmark_db

    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}

    volumes:
      - mongodb_data:/data/db

    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    restart: always

    env_file:
      - .env

    depends_on:
      - mongodb

    deploy:
      replicas: 4

    networks:
      - app_network

  nginx:
    image: nginx:latest

    container_name: nginx_proxy

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

    networks:
      - app_network

